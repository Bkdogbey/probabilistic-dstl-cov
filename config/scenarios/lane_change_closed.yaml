# Lane Change — closed-loop covariance steering
#
# Identical environment to lane_change.yaml.
# The feedback gain K_t is jointly optimized with V_t,
# steering the covariance via (A + B K_eff) Σ (A + B K_eff)^T + DDT.

label: "Lane Change (Closed-Loop)"
horizon: 20

optimizer:
  lr_v: 0.05
  lr_k: 0.01
  max_iters: 500
  alpha: 0.95

weights:
  w_phi: 10.0
  w_du: 0.001
  w_dist: 0.1
  w_obs: 5.0
  w_K: 0.005
  w_cov: 0.1

initial_state:
  mean: [0.0, 1.5, 3.0, 0.0]         # [x, y, vx, vy]
  cov_diag: [0.1, 0.1, 0.05, 0.05]

goal:
  x: [9.0, 11.0]
  y: [3.0, 5.5]

bounds:
  x: [-1.0, 11.0]
  y: [0.0, 7.0]

obstacles:
  - center: [5.0, 1.5]
    radius: 0.8
  - center: [7.5, 2.5]
    radius: 0.8
