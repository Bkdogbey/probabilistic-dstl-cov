[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "probabilistic-dstl-cov"
version = "0.1.0"
description = ""
authors = "Your name (or your organization/company/team)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.8"

dependencies = [
    "click",
    "Sphinx",
    "coverage",
    "awscli",
    "flake8",
    "python-dotenv>=0.5.1",
    "python3",
    "pathlib2",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pre-commit",
    "ruff",
    "black",
    "isort",
    "mypy"
]

[tool.setuptools]
packages = ["src"]
package-dir = {"" = "src"}

# Ruff: Linting, PEP8, and naming convention enforcement
[tool.ruff]
select = ["E", "F", "N"]  # E: pycodestyle, F: pyflakes, N: pep8-naming
# N803/N806/N816: suppress for domain-specific uppercase math variables
# (K, V, T, J, Sigma, A_cl follow standard control/linear-algebra notation)
ignore = ["N803", "N806", "N816"]
line-length = 99
target-version = "py38"

# pytest
[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q"
testpaths = ["tests"]
